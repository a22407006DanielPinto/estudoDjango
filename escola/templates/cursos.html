<html>
<body>

<h2>Cursos:</h2>

<ul>
{% for curso in cursos %}
    <li>Cursos: {{curso.nome}}
        <a href="/escola/curso/editar/{{ curso.id }}/">Editar</a>
        <a href="/escola/curso/apagar/{{ curso.id }}/">Apagar</a>
        <p>Professor: {{curso.professor.nome}}</p>
        <p>Estudantes:</p>
        <ul>
        {% for estudante in curso.estudantes.all %}
            <li><a href="{% url 'estudante_view' estudante.id %}">{{estudante.nome}}</a></li>
        {% endfor %}
        </ul>
    </li>
{% endfor %}
</ul>

</body>
</html>
